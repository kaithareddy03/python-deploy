stages:
  - deploy

variables:
  GIT_STRATEGY: none   # 👈 disables git completely

deploy_job:
  stage: deploy
  tags:
    - windows

  script:
    - echo "Deploying without Git..."

    - powershell -Command "
        if (Test-Path 'D:\test') {
          Remove-Item -Recurse -Force 'D:\test\*'
        } else {
          New-Item -ItemType Directory -Path 'D:\test'
        }

        Write-Host 'Deployment completed!'
      "
