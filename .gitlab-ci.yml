deploy_job:
  stage: deploy
  script:
    - echo "🚀 Starting deployment"

    # Backup
    - powershell -Command "
        Write-Host 'Checking drives...';
        Get-PSDrive;

        \$path = 'D:\test\output';

        if (!(Test-Path \$path)) {
            Write-Host 'Path not found';
            exit 1;
        }

        \$backupPath = 'D:\test\backup_' + (Get-Date -Format 'yyyyMMdd_HHmmss');

        Copy-Item \$path \$backupPath -Recurse;

        Write-Host 'Backup created';
      "
