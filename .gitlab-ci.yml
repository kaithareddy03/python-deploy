stages:
  - build
  - security
  - deploy

# 🔹 BUILD STAGE
build_job:
  stage: build
  tags:
    - linux

  script:
    - echo "📥 Using existing folder - updating from GitHub"

    - git remote set-url origin https://github.com/kaithareddy03/python-deploy.git
    - git fetch origin
    - git reset --hard origin/main
    - git clean -fd

    - echo "🔍 Latest commit:"
    - git log -1

    - echo "📂 Files:"
    - ls -l

  artifacts:
    paths:
      - .
    expire_in: 1 hour


# 🔐 🔍 SECURITY STAGE (DevSecOps Added)
security_scan:
  stage: security
  tags:
    - linux

  script:
    - echo "🔐 Running DevSecOps Security Checks"

    # 🔍 1. Dependency Vulnerability Scan
    - pip install safety
    - safety check || true

    # 🔍 2. Static Code Analysis (SAST)
    - pip install bandit
    - bandit -r . || true

    # 🔍 3. Secrets Detection
    - pip install detect-secrets
    - detect-secrets scan > secrets-report.json || true

    # 🔍 4. Basic Python Lint (optional)
    - pip install flake8
    - flake8 . || true

  artifacts:
    paths:
      - secrets-report.json
    expire_in: 1 hour


# 🔹 DEPLOY STAGE (Windows)
deploy_job:
  stage: deploy
  tags:
    - windows

  dependencies:
    - build_job
    - security_scan

  variables:
    GIT_STRATEGY: none

  script:
    - echo "🚀 Deploying latest code to Windows"

    - powershell -Command "hostname"

    # Clean old files
    - powershell -Command "Remove-Item 'D:\\test\\output\\*' -Recurse -Force -ErrorAction SilentlyContinue"

    # Copy updated files
    - powershell -Command "Copy-Item * -Destination 'D:\\test\\output' -Recurse -Force"

    # Verify deployment
    - powershell -Command "Write-Host '📄 Latest app.py:'"
    - powershell -Command "Get-Content 'D:\\test\\output\\app.py'"
