stages:
  - build
  - deploy

variables:
  APP_PATH: "D:\\test"

build_job:
  stage: build
  tags:
    - linux
  script:
    - echo "Preparing files..."
  artifacts:
    paths:
      - .

deploy_job:
  stage: deploy
  tags:
    - windows

  variables:
    GIT_STRATEGY: none

  dependencies:
    - build_job

  script:
    - echo "Copying files to Windows..."

    - powershell -Command "
        Write-Host 'Preparing folder...';

        if (Test-Path '$env:APP_PATH') {
          Remove-Item -Recurse -Force '$env:APP_PATH\*'
        } else {
          New-Item -ItemType Directory -Path '$env:APP_PATH'
        }

        Write-Host 'Copying files...';
        Copy-Item -Path * -Destination '$env:APP_PATH' -Recurse -Force;

        Write-Host 'Files copied successfully!';
      "
