deploy_job:
  stage: deploy
  tags:
    - windows   # 👈 MUST MATCH

  script:
    - echo "Deploying on Windows runner..."

    - powershell -Command "
        if (Test-Path 'D:\test') {
          Remove-Item -Recurse -Force 'D:\test\*'
        } else {
          New-Item -ItemType Directory -Path 'D:\test'
        }

        Copy-Item -Path * -Destination 'D:\test\' -Recurse

        Write-Host 'Deployment completed!'
      "
