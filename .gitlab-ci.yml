stages:
  - build
  - deploy

variables:
  APP_PATH: "D:\\test"

build_job:
  stage: build
  tags:
    - linux
  script:
    - echo "Installing dependencies..."
    - pip3 install -r requirements.txt || true
    - echo "Build completed"

deploy_job:
  stage: deploy
  tags:
    - windows

  variables:
    GIT_STRATEGY: none

  script:
    - echo "Deploying on Windows..."

    - powershell -Command "
        Write-Host 'Stopping old app...';
        Get-Process python -ErrorAction SilentlyContinue | Stop-Process -Force;

        if (Test-Path '$env:APP_PATH') {
          Remove-Item -Recurse -Force '$env:APP_PATH\*'
        } else {
          New-Item -ItemType Directory -Path '$env:APP_PATH'
        }

        Copy-Item -Path * -Destination '$env:APP_PATH' -Recurse;

        Write-Host 'Starting app...';
        Start-Process python '$env:APP_PATH\app.py';

        Write-Host 'Deployment completed!'
      "
