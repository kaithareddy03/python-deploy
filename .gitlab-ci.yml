stages:
  - build
  - deploy

# 🔹 BUILD STAGE (Use same folder + pull latest GitHub code)
build_job:
  stage: build
  tags:
    - linux

  script:
    - echo "📥 Using existing folder - updating from GitHub"

    # Ensure correct remote (GitHub)
    - git remote set-url origin https://github.com/kaithareddy03/python-deploy.git

    # Fetch latest changes
    - git fetch origin

    # Force sync with GitHub (no old code remains)
    - git reset --hard origin/main

    # Clean untracked files (optional but recommended)
    - git clean -fd

    # Debug
    - echo "🔍 Latest commit:"
    - git log -1

    - echo "🔍 Remote URL:"
    - git remote -v

    - echo "📂 Files:"
    - ls -l

  artifacts:
    paths:
      - .
    expire_in: 1 hour


# 🔹 DEPLOY STAGE (Windows)
deploy_job:
  stage: deploy
  tags:
    - windows

  dependencies:
    - build_job

  variables:
    GIT_STRATEGY: none   # 🚫 Don't use GitLab repo

  script:
    - echo "🚀 Deploying latest code to Windows"

    # Server check
    - powershell -Command "hostname"

    # Clean old files
    - powershell -Command "Remove-Item 'D:\\test\\output\\*' -Recurse -Force -ErrorAction SilentlyContinue"

    # Copy updated files
    - powershell -Command "Copy-Item * -Destination 'D:\\test\\output' -Recurse -Force"

    # Verify deployment
    - powershell -Command "Write-Host '📄 Latest app.py:'"
    - powershell -Command "Get-Content 'D:\\test\\output\\app.py'"
