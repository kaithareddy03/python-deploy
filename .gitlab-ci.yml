stages:
  - deploy

deploy_job:
  stage: deploy
  tags:
    - windows   # VERY IMPORTANT

  variables:
    GIT_STRATEGY: none   # ❌ disables git clone

  script:
    - echo "🚀 Starting deployment (No Git)"

    # Check runner
    - powershell -Command "hostname"
    - powershell -Command "Get-PSDrive"

    # Clean folder
    - powershell -Command "Remove-Item 'D:\test\output\*' -Recurse -Force -ErrorAction SilentlyContinue"

    # Copy from fixed source path
    - powershell -Command "Copy-Item 'D:\source\*' -Destination 'D:\test\output' -Recurse -Force"

    # Verify
    - powershell -Command "Get-ChildItem 'D:\test\output'"
